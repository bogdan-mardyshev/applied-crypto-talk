name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: infrastructure/requirements.txt
      - run: pip install ruff==0.4.4 black==24.4.2
      - run: ruff check demos/ tests/
      - run: black --check demos/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: infrastructure/requirements.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev
      - name: Install Python dependencies
        run: pip install -r infrastructure/requirements.txt
      - name: Run tests
        run: pytest -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
